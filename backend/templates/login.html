<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - URL Security</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f1419; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        .login-container { background: #1a1f2e; padding: 3rem; border-radius: 10px; border: 1px solid #2d3748; width: 100%; max-width: 400px; }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header i { font-size: 3rem; color: #10b981; margin-bottom: 1rem; }
        .login-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .login-header p { color: #94a3b8; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #cbd5e0; }
        .form-group input { width: 100%; padding: 1rem; background: #0f1419; border: 1px solid #374151; border-radius: 5px; color: white; font-size: 1rem; }

        .btn-login { width: 100%; padding: 1rem; background: #10b981; color: white; border: none; border-radius: 5px; font-size: 1.1rem; cursor: pointer; transition: background 0.3s; }
        .btn-login:hover { background: #059669; }

        .demo-credentials { margin-top: 2rem; padding: 1rem; background: #0f1419; border-radius: 5px; border: 1px solid #374151; }
        .demo-credentials h4 { margin-bottom: 0.5rem; color: #f59e0b; }
        .demo-credentials p { color: #94a3b8; font-size: 0.9rem; }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <i class="fas fa-shield-alt"></i>
            <h1>URL Security</h1>
            <p>Sign in to access the security dashboard</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="demo-credentials">
            <h4>Demo Credentials</h4>
            <p>Username: <strong>admin</strong></p>
            <p>Password: <strong>admin</strong></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Simple authentication
            if (username === 'admin' && password === 'admin') {
                window.location.href = '/choose';
            } else {
                alert('Invalid credentials! Use admin/admin');
            }
        });
    </script>
</body>
</html>
